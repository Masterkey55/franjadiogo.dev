<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>franjadiogo.dev — primeiro sinal</title>
<style>
  :root {
    --bg:        #0B1020;
    --panel:     #0F1530;
    --ink:       #E6E9F2;
    --muted:     #6B7394;
    --line:      #1E2748;
    --signal:    #F4B860; /* estado: a ligar */
    --ok:        #5EEAD4; /* estado: resolvido */
    --accent:    #C56CF0;
    --mono: ui-monospace, "SFMono-Regular", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    margin: 0;
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(197,108,240,0.10), transparent 60%),
      radial-gradient(900px 500px at 90% 110%, rgba(94,234,212,0.08), transparent 55%),
      var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    display: grid;
    place-items: center;
    padding: 24px;
    min-height: 100%;
  }

  .card {
    width: min(640px, 100%);
    background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent), var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 30px 80px -40px rgba(0,0,0,0.9);
  }

  .bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }
  .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--line); }
  .dot.live { background: var(--signal); animation: pulse 1.4s ease-in-out infinite; }
  .bar .host { margin-left: auto; }

  .body { padding: 26px 22px 22px; }

  /* sequência de ligação */
  .seq {
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.9;
    color: var(--muted);
    margin: 0 0 22px;
    min-height: 152px;
  }
  .seq .row { display: flex; gap: 10px; opacity: 0; transform: translateY(4px); }
  .seq .row.show { opacity: 1; transform: none; transition: all .25s ease; }
  .seq .step { color: var(--ink); }
  .seq .lead { color: var(--muted); flex: 1; border-bottom: 1px dotted var(--line); align-self: center; height: 1px; margin: 0 2px; }
  .seq .state { color: var(--ok); }
  .seq .cursor::after { content:"▋"; color: var(--signal); animation: blink 1s steps(1) infinite; }

  /* confirmação */
  .verdict {
    opacity: 0;
    transform: translateY(8px);
    transition: all .4s ease;
    border-top: 1px solid var(--line);
    padding-top: 22px;
  }
  .verdict.show { opacity: 1; transform: none; }

  .verdict h1 {
    margin: 0;
    font-family: var(--mono);
    font-size: clamp(28px, 7vw, 40px);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ok);
  }
  .verdict h1 .check { color: var(--ok); margin-right: 10px; }
  .verdict p { margin: 6px 0 0; color: var(--muted); font-size: 14px; }
  .verdict p .resolved { color: var(--accent); font-family: var(--mono); }

  /* factos reais */
  .facts {
    margin-top: 22px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
  }
  .fact { background: var(--panel); padding: 12px 14px; }
  .fact .k { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
  .fact .v { font-family: var(--mono); font-size: 14px; color: var(--ink); margin-top: 4px; word-break: break-word; }
  .fact .v.good { color: var(--ok); }

  footer {
    margin-top: 20px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  footer .accent { color: var(--accent); }

  @keyframes pulse { 0%,100%{ box-shadow: 0 0 0 0 rgba(244,184,96,0.5);} 50%{ box-shadow: 0 0 0 6px rgba(244,184,96,0);} }
  @keyframes blink { 50% { opacity: 0; } }

  @media (max-width: 420px) {
    .facts { grid-template-columns: 1fr; }
  }

  @media (prefers-reduced-motion: reduce) {
    .seq .row, .verdict { transition: none; }
    .dot.live { animation: none; }
    .seq .cursor::after { animation: none; }
  }
</style>
</head>
<body>
  <main class="card">
    <div class="bar">
      <span class="dot live"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="host" id="bar-host">a ligar…</span>
    </div>

    <div class="body">
      <div class="seq" id="seq" aria-live="polite"></div>

      <div class="verdict" id="verdict">
        <h1><span class="check">✓</span>está no ar</h1>
        <p>o teu domínio <span class="resolved" id="resolved">franjadiogo.dev</span> serviu esta página.</p>

        <div class="facts" id="facts"></div>

        <footer>
          <span>franjadiogo.dev · <span class="accent">primeiro sinal</span></span>
          <span>página de teste — Diogo</span>
        </footer>
      </div>
    </div>
  </main>

<script>
(function () {
  const t0 = performance.now();
  const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  const seq = document.getElementById("seq");
  const steps = [
    ["resolver",  "ok"],
    ["servidor",  "ligado"],
    ["TLS",       location.protocol === "https:" ? "seguro" : "sem TLS"],
    ["página",    "servida"],
  ];

  function makeRow(step, state) {
    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML =
      '<span class="step">' + step + '</span>' +
      '<span class="lead"></span>' +
      '<span class="state">' + state + '</span>';
    seq.appendChild(row);
    return row;
  }

  function reveal() {
    document.getElementById("verdict").classList.add("show");

    const host = location.hostname || "localhost";
    document.getElementById("bar-host").textContent = host;
    document.getElementById("resolved").textContent = host;

    const dt = new Date();
    const ms = Math.max(1, Math.round(performance.now() - t0));
    const facts = [
      ["host servido",   host, true],
      ["protocolo",      location.protocol.replace(":", ""), location.protocol === "https:"],
      ["carregado",      dt.toLocaleTimeString("pt-PT"), false],
      ["pronto em",      ms + " ms", false],
    ];
    const grid = document.getElementById("facts");
    facts.forEach(([k, v, good]) => {
      const cell = document.createElement("div");
      cell.className = "fact";
      cell.innerHTML = '<div class="k">' + k + '</div><div class="v' + (good ? ' good' : '') + '">' + v + '</div>';
      grid.appendChild(cell);
    });
  }

  if (reduce) {
    steps.forEach(([s, st]) => makeRow(s, st).classList.add("show"));
    reveal();
    return;
  }

  let i = 0;
  function next() {
    if (i >= steps.length) { setTimeout(reveal, 250); return; }
    const [s, st] = steps[i++];
    const row = makeRow(s, st);
    requestAnimationFrame(() => row.classList.add("show"));
    setTimeout(next, 420);
  }
  setTimeout(next, 300);
})();
</script>
</body>
</html>
